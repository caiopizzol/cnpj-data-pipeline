# CNPJ Data Pipeline
#
# Usage:
#   docker compose up -d postgres                          # Start database only
#   docker compose run --rm pipeline --list                # List available months
#   docker compose run --rm pipeline                       # Process latest month
#   docker compose run --rm pipeline --month 2024-11       # Process specific month
#   docker compose down                                    # Stop services

services:
  pipeline:
    build: .
    container_name: cnpj-pipeline
    env_file: .env
    environment:
      # Override DATABASE_URL for container networking
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cnpj
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./temp:/app/temp

  postgres:
    image: postgres:16-alpine
    container_name: cnpj-pipeline-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cnpj
    ports:
      - "5435:5432"
    volumes:
      - cnpj_pipeline_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cnpj_pipeline_data:
